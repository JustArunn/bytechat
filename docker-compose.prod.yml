services:
  # Backend Production Service
  backend:
    container_name: bytechat-backend-prod
    image: bytechat-backend:latest
    build:
      context: ./apps/backend
      dockerfile: ../../docker/backend/Dockerfile.prod
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/bytechat
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://localhost:80,http://*.localhost}
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1024M
    ports:
      - "8080:8080"

  # Frontend Production Service
  frontend:
    container_name: bytechat-frontend-prod
    image: bytechat-frontend:latest
    build:
      context: ./apps/frontend
      dockerfile: ../../docker/frontend/Dockerfile.prod
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  # Database Production Service
  db:
    container_name: bytechat-db-prod
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-bytechat}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

volumes:
  postgres_prod_data:
