name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/frontend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: apps/frontend/package-lock.json
    - name: Install dependencies
      run: npm install
      working-directory: apps/frontend
    - name: Build
      run: npm run build
      working-directory: apps/frontend
