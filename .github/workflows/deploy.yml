name: Cloud Deployment (CD)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloud VM (AWS/Azure/GCP)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        port: 22
        script: |
          mkdir -p ~/bytechat
          cd ~/bytechat
          
          # Force sync with GitHub (prevents pull conflicts)
          if [ ! -d .git ]; then
            git clone https://github.com/${{ github.repository }} .
          else
            git fetch origin main
            git reset --hard origin/main
          fi
          
          # Inject production secrets into .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" > .env
          echo "SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}" >> .env
          echo "SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}" >> .env
          echo "ALLOWED_ORIGINS=${{ secrets.ORIGIN }}" >> .env
          echo "VITE_API_URL=${{ secrets.ORIGIN }}" >> .env
          
          # Force restart with new configuration
          docker-compose -f docker-compose.prod.yml down
          docker-compose -f docker-compose.prod.yml up -d --build
          docker image prune -f
