spring.application.name=bytechat

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bytechat}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# JWT Configuration
bytechat.jwt.secret=${JWT_SECRET:your-very-secure-and-long-secret-key-that-should-be-at-least-256-bits}
bytechat.jwt.expiration=${JWT_EXPIRATION:86400000}
bytechat.jwt.cookieName=jwt-token

# Server Configuration
server.port=${PORT:8080}

# VAPID Configuration
